# ============================
#  SlashAI — Dev Profile
#  Active with: SPRING_PROFILES_ACTIVE=dev
# ============================

# Show SQL — helpful for local debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DevTools hot-reload
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Verbose logging in dev
logging.level.com.workflowos=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.flywaydb=DEBUG

# Expose all Actuator endpoints in dev
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

# Swagger enabled in dev
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# CORS — allow Vite dev server
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# JWT — shorter expiry for testing
jwt.expiry-ms=3600000
