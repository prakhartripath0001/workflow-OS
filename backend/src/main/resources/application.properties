# ============================
#  Workflow OS — Backend Config
# ============================

# Server
server.port=8080
spring.application.name=workflow-os-backend

# ─── PostgreSQL DataSource ───────────────────────────────────────────────────
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/workflowos}
spring.datasource.username=${DB_USERNAME:workflowos}
spring.datasource.password=${DB_PASSWORD:workflowos}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── SQL Initialization ───────────────────────────────────────────────────────
# Spring Boot runs schema.sql first, then data.sql on every startup
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/schema.sql
spring.sql.init.data-locations=classpath:db/data.sql
# Must defer init until JPA/Hibernate is ready
spring.jpa.defer-datasource-initialization=true
# Use ^^ as statement separator so $$ dollar-quoted PL/pgSQL blocks are not split on semicolons
spring.sql.init.separator=^^

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Workflow OS Backend
info.app.version=1.0.0
info.app.java-version=17

# ─── Dev-tools ───────────────────────────────────────────────────────────────
spring.devtools.restart.enabled=true

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.workflowos=DEBUG
logging.level.org.springframework.jdbc.core=DEBUG

