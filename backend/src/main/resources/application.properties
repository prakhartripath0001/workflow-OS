# ============================
#  Workflow OS — Backend Config
# ============================

# Server
server.port=8080
spring.application.name=workflow-os-backend

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
info.app.name=Workflow OS Backend
info.app.version=1.0.0
info.app.java-version=17

# Dev-tools (set false in production)
spring.devtools.restart.enabled=true

# Logging
logging.level.com.workflowos=DEBUG
