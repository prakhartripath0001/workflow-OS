# ============================
#  SlashAI — Production Profile
#  Active with: SPRING_PROFILES_ACTIVE=prod
# ============================

# Hide SQL in production logs (security + performance)
spring.jpa.show-sql=false

# Disable DevTools in production
spring.devtools.restart.enabled=false

# Minimal logging — only WARN and above for most packages
logging.level.root=WARN
logging.level.com.workflowos=INFO
logging.level.org.springframework.security=WARN

# JSON logging for structured log aggregation (Datadog / CloudWatch)
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Only expose health + info in production (never metrics to public)
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Disable Swagger UI in production (optional — enable behind auth if needed)
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# CORS — restrict to production frontend domain
spring.web.cors.allowed-origins=${FRONTEND_ORIGIN:https://app.slashai.app}

# Flyway — always run migrations in production
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true

# JWT — production expiry
jwt.expiry-ms=${JWT_EXPIRY_MS:900000}
