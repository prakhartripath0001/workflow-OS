# =============================================================================
#  SlashAI — Continuous Integration
#  Triggers: push/PR to main, develop, and release/* branches
#  Jobs: backend (Maven), frontend (Node/Vite), lint, security-scan
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop, "release/**", "hotfix/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: "17"
  NODE_VERSION: "20"

jobs:
  # ─────────────────────────────────────────────────
  #  Backend — Spring Boot (Maven + JUnit)
  # ─────────────────────────────────────────────────
  backend:
    name: Backend · Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: workflowos_test
          POSTGRES_USER: workflowos
          POSTGRES_PASSWORD: workflowos_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Validate POM
        run: mvn validate --no-transfer-progress

      - name: Compile
        run: mvn compile --no-transfer-progress

      - name: Run Tests
        run: mvn test --no-transfer-progress
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_URL: jdbc:postgresql://localhost:5432/workflowos_test
          DB_USERNAME: workflowos
          DB_PASSWORD: workflowos_test
          GOOGLE_CLIENT_ID: dummy
          GOOGLE_CLIENT_SECRET: dummy
          GITHUB_CLIENT_ID: dummy
          GITHUB_CLIENT_SECRET: dummy

      - name: Package (skip tests — already ran)
        run: mvn package -DskipTests --no-transfer-progress

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  # ─────────────────────────────────────────────────
  #  Frontend — Vite + React + ESLint
  # ─────────────────────────────────────────────────
  frontend:
    name: Frontend · Lint, Type-check & Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Build (Vite)
        run: npm run build
        env:
          VITE_API_BASE_URL: http://localhost:8080

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ─────────────────────────────────────────────────
  #  Security — Dependency Scan (OWASP)
  # ─────────────────────────────────────────────────
  security-scan:
    name: Security · OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: [backend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: OWASP Dependency Check
        run: |
          cd backend
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            --no-transfer-progress || true

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: backend/target/dependency-check-report.html

  # ─────────────────────────────────────────────────
  #  Status Gate — All jobs must pass
  # ─────────────────────────────────────────────────
  all-checks-pass:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - run: echo "✅ All CI checks passed!"
